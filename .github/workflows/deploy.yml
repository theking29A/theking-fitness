name: Deploy to Aliyun ECS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          cd theking_backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Build Frontend
        run: |
          cd theking-fitness-vue
          npm install
          npm run build-only

      - name: Build Admin Frontend
        run: |
          cd theking_admin
          npm install
          npm run build

      - name: Tar Frontend Artifacts
        run: |
          cd theking-fitness-vue/dist
          tar czf ../../frontend.tar.gz .
          cd ../../theking_admin/dist
          tar czf ../../admin.tar.gz .

      - name: Deploy Backend JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "theking_backend/target/theking-backend-0.0.1-SNAPSHOT.jar"
          target: "/opt/app/"
          strip_components: 2
          overwrite: true

      - name: Deploy Frontend Tar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "frontend.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Deploy Admin Tar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "admin.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Restart & Deploy Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            # 创建上传目录
            mkdir -p /opt/app/uploads
            chmod 755 /opt/app/uploads

            # 重启后端
            systemctl restart theking
            systemctl status theking --no-pager

            # 部署前端
            rm -rf /usr/share/nginx/html/*
            tar xzf /tmp/frontend.tar.gz -C /usr/share/nginx/html/
            mkdir -p /usr/share/nginx/html/admin
            tar xzf /tmp/admin.tar.gz -C /usr/share/nginx/html/admin/

            # 配置 Nginx
            cat > /etc/nginx/conf.d/admin.conf << 'EOF'
            location /admin {
                alias /usr/share/nginx/html/admin;
                index index.html;
                try_files $uri $uri/ =404;
            }
            EOF

            # 配置文件上传静态访问
            cat > /etc/nginx/conf.d/uploads.conf << 'EOF'
            location /uploads {
                alias /opt/app/uploads;
                autoindex off;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
            EOF

            nginx -t && systemctl reload nginx
            echo "Deploy completed!"

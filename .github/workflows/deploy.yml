name: Deploy to Aliyun ECS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          cd theking_backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          echo "Backend build success"

      - name: Build Frontend
        run: |
          cd theking-fitness-vue
          npm ci
          npm run build-only
          echo "Frontend build success, dist files:"
          ls -la dist/

      - name: Build Admin Frontend
        run: |
          cd theking_admin
          npm install
          npm run build
          echo "Admin build success, dist files:"
          ls -la dist/

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          echo "sshpass installed"

      - name: Deploy Backend JAR
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PORT: ${{ secrets.PORT }}
        run: |
          sshpass -p "$PASSWORD" scp -o StrictHostKeyChecking=no -P "$PORT" \
            theking_backend/target/theking-backend-0.0.1-SNAPSHOT.jar \
            "$USERNAME@$HOST:/opt/app/"

      - name: Deploy Frontend
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PORT: ${{ secrets.PORT }}
        run: |
          cd theking-fitness-vue/dist
          tar czf ../../frontend.tar.gz .
          cd ../..
          sshpass -p "$PASSWORD" scp -o StrictHostKeyChecking=no -P "$PORT" \
            frontend.tar.gz "$USERNAME@$HOST:/tmp/"

      - name: Deploy Admin Frontend
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PORT: ${{ secrets.PORT }}
        run: |
          cd theking_admin/dist
          tar czf ../../admin.tar.gz .
          cd ../..
          sshpass -p "$PASSWORD" scp -o StrictHostKeyChecking=no -P "$PORT" \
            admin.tar.gz "$USERNAME@$HOST:/tmp/"

      - name: Restart & Configure Server
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PORT: ${{ secrets.PORT }}
        run: |
          sshpass -p "$PASSWORD" ssh -o StrictHostKeyChecking=no -p "$PORT" "$USERNAME@$HOST" << 'REMOTE'
            set -e

            # 部署后端
            mkdir -p /opt/theking
            mv /opt/app/theking-backend-0.0.1-SNAPSHOT.jar /opt/theking/app.jar
            systemctl restart theking
            echo "Backend restarted."

            # 部署主站前端
            rm -rf /usr/share/nginx/html/*
            tar xzf /tmp/frontend.tar.gz -C /usr/share/nginx/html/

            # 部署 Admin 前端
            mkdir -p /usr/share/nginx/html/admin
            rm -rf /usr/share/nginx/html/admin/*
            tar xzf /tmp/admin.tar.gz -C /usr/share/nginx/html/admin/

            # 更新 Nginx 配置
            cat > /etc/nginx/conf.d/admin.conf << 'EOF'
            location /admin {
                alias /usr/share/nginx/html/admin;
                index index.html;
                try_files $uri $uri/ =404;
            }
            EOF

            nginx -t && systemctl reload nginx
            echo "Deploy completed!"
          REMOTE
